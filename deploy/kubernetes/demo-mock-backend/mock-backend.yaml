apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-backend
  labels:
    app.kubernetes.io/name: grayfile
    app.kubernetes.io/component: mock-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grayfile
      app.kubernetes.io/component: mock-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grayfile
        app.kubernetes.io/component: mock-backend
    spec:
      containers:
        - name: wiremock
          image: wiremock/wiremock:3.13.1
          args:
            - --global-response-templating
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: mock-backend-mappings
              mountPath: /home/wiremock/mappings
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: mock-backend-mappings
          configMap:
            name: mock-backend-mappings
---
apiVersion: v1
kind: Service
metadata:
  name: mock-backend
  labels:
    app.kubernetes.io/name: grayfile
    app.kubernetes.io/component: mock-backend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: grayfile
    app.kubernetes.io/component: mock-backend
  ports:
    - name: http
      port: 8080
      targetPort: http
