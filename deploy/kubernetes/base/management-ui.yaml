apiVersion: apps/v1
kind: Deployment
metadata:
  name: management-ui
  labels:
    app.kubernetes.io/name: grayfile
    app.kubernetes.io/component: management-ui
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: grayfile
      app.kubernetes.io/component: management-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grayfile
        app.kubernetes.io/component: management-ui
    spec:
      containers:
        - name: management-ui
          image: registry.example.com/grayfile/management-ui:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: management-ui
  labels:
    app.kubernetes.io/name: grayfile
    app.kubernetes.io/component: management-ui
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: grayfile
    app.kubernetes.io/component: management-ui
  ports:
    - name: http
      port: 80
      targetPort: http
