apiVersion: apps/v1
kind: Deployment
metadata:
  name: envoy
  labels:
    app.kubernetes.io/name: grayfile
    app.kubernetes.io/component: envoy
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: grayfile
      app.kubernetes.io/component: envoy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grayfile
        app.kubernetes.io/component: envoy
    spec:
      containers:
        - name: envoy
          image: envoyproxy/envoy:v1.33.2
          args:
            - envoy
            - -c
            - /etc/envoy/envoy.yaml
            - --log-level
            - info
          ports:
            - name: public-llm
              containerPort: 11000
            - name: management
              containerPort: 11001
            - name: backend-egress
              containerPort: 10000
            - name: admin
              containerPort: 9901
          volumeMounts:
            - name: envoy-config
              mountPath: /etc/envoy
              readOnly: true
          readinessProbe:
            httpGet:
              path: /ready
              port: admin
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ready
              port: admin
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: envoy-config
          configMap:
            name: envoy-config
---
apiVersion: v1
kind: Service
metadata:
  name: envoy
  labels:
    app.kubernetes.io/name: grayfile
    app.kubernetes.io/component: envoy
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: grayfile
    app.kubernetes.io/component: envoy
  ports:
    - name: public-llm
      port: 11000
      targetPort: public-llm
    - name: management
      port: 11001
      targetPort: management
    - name: backend-egress
      port: 10000
      targetPort: backend-egress
    - name: admin
      port: 9901
      targetPort: admin
