apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  labels:
    app.kubernetes.io/name: grayfile
    app.kubernetes.io/component: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: grayfile
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grayfile
        app.kubernetes.io/component: gateway
    spec:
      containers:
        - name: gateway
          image: registry.example.com/grayfile/gateway:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: GRAYFILE_BACKEND_URL
              value: http://envoy:10000
            - name: GRAYFILE_BACKEND_MODE
              value: direct
            - name: GRAYFILE_LITELLM_BASE_URL
              value: http://litellm:4000
            - name: GRAYFILE_LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: grayfile-litellm-secret
                  key: LITELLM_MASTER_KEY
            - name: GRAYFILE_LITELLM_SYNC_ENABLED
              value: "false"
            - name: GRAYFILE_LITELLM_SYNC_DRY_RUN
              value: "true"
            - name: GRAYFILE_DB_URL
              valueFrom:
                secretKeyRef:
                  name: grayfile-db-secret
                  key: GRAYFILE_DB_URL
            - name: GRAYFILE_DB_USER
              valueFrom:
                secretKeyRef:
                  name: grayfile-db-secret
                  key: GRAYFILE_DB_USER
            - name: GRAYFILE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grayfile-db-secret
                  key: GRAYFILE_DB_PASSWORD
            - name: GRAYFILE_AUDIT_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: grayfile-app-secret
                  key: GRAYFILE_AUDIT_SIGNING_KEY
            - name: GRAYFILE_USAGE_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: grayfile-app-secret
                  key: GRAYFILE_USAGE_SIGNING_KEY
          readinessProbe:
            httpGet:
              path: /q/metrics
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  labels:
    app.kubernetes.io/name: grayfile
    app.kubernetes.io/component: gateway
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: grayfile
    app.kubernetes.io/component: gateway
  ports:
    - name: http
      port: 8080
      targetPort: http
