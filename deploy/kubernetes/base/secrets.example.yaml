apiVersion: v1
kind: Secret
metadata:
  name: grayfile-db-secret
  namespace: grayfile
type: Opaque
stringData:
  GRAYFILE_DB_URL: jdbc:postgresql://postgres.example.internal:5432/grayfile
  GRAYFILE_DB_USER: grayfile
  GRAYFILE_DB_PASSWORD: change-me
---
apiVersion: v1
kind: Secret
metadata:
  name: grayfile-app-secret
  namespace: grayfile
type: Opaque
stringData:
  GRAYFILE_AUDIT_SIGNING_KEY: replace-with-a-long-random-secret
  GRAYFILE_USAGE_SIGNING_KEY: replace-with-a-long-random-secret
---
apiVersion: v1
kind: Secret
metadata:
  name: grayfile-grafana-secret
  namespace: grayfile
type: Opaque
stringData:
  GF_SECURITY_ADMIN_USER: admin
  GF_SECURITY_ADMIN_PASSWORD: change-me
