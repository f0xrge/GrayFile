services:
  gateway:
    build:
      context: ..
      dockerfile: gateway/src/main/docker/Dockerfile.jvm
    container_name: grayfile-gateway
    ports:
      - "8080:8080"
    environment:
      GRAYFILE_DB_URL: jdbc:postgresql://postgres:5432/grayfile
      GRAYFILE_DB_USER: grayfile
      GRAYFILE_DB_PASSWORD: grayfile
      GRAYFILE_BACKEND_URL: http://envoy:10000
    depends_on:
      postgres:
        condition: service_healthy
      envoy:
        condition: service_started

  postgres:
    image: postgres:16
    container_name: grayfile-postgres
    environment:
      POSTGRES_USER: grayfile
      POSTGRES_PASSWORD: grayfile
      POSTGRES_DB: grayfile
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grayfile -d grayfile"]
      interval: 5s
      timeout: 5s
      retries: 10

  mock-backend:
    image: wiremock/wiremock:3.13.1
    container_name: grayfile-mock-backend
    command: ["--global-response-templating"]
    ports:
      - "8000:8080"
    volumes:
      - ./mock-backend:/home/wiremock


  envoy:
    image: envoyproxy/envoy:v1.33.2
    container_name: grayfile-envoy
    command: ["envoy", "-c", "/etc/envoy/envoy.yaml", "--log-level", "info"]
    ports:
      - "10000:10000"
      - "9901:9901"
    volumes:
      - ./envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro
    depends_on:
      mock-backend:
        condition: service_started
  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: grayfile-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      gateway:
        condition: service_started

  grafana:
    image: grafana/grafana:11.5.2
    container_name: grayfile-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  pgdata:
