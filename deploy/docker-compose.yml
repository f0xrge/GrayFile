services:
  management-ui:
    build:
      context: ..
      dockerfile: management-ui/Dockerfile
    container_name: grayfile-management-ui
    ports:
      - "4200:80"
    depends_on:
      gateway:
        condition: service_started

  gateway:
    build:
      context: ..
      dockerfile: gateway/src/main/docker/Dockerfile.jvm
    container_name: grayfile-gateway
    ports:
      - "8080:8080"
    environment:
      GRAYFILE_DB_URL: jdbc:postgresql://postgres:5432/grayfile
      GRAYFILE_DB_USER: grayfile
      GRAYFILE_DB_PASSWORD: grayfile
      GRAYFILE_BACKEND_URL: http://mock-backend:8080
      GRAYFILE_BACKEND_MODE: ${GRAYFILE_BACKEND_MODE:-direct}
      GRAYFILE_LITELLM_BASE_URL: http://litellm:4000
      GRAYFILE_LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-grayfile-dev}
      GRAYFILE_LITELLM_SYNC_ENABLED: ${GRAYFILE_LITELLM_SYNC_ENABLED:-false}
      GRAYFILE_LITELLM_SYNC_DRY_RUN: ${GRAYFILE_LITELLM_SYNC_DRY_RUN:-true}
    depends_on:
      postgres:
        condition: service_healthy
      litellm:
        condition: service_started

  litellm:
    image: docker.litellm.ai/berriai/litellm:main-latest
    container_name: grayfile-litellm
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      DATABASE_URL: postgresql://grayfile:grayfile@postgres:5432/litellm
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-grayfile-dev}
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY:-grayfile-dev-salt-key}
      MOCK_BACKEND_API_BASE: http://mock-backend:8080
      MOCK_BACKEND_API_KEY: sk-mock
    expose:
      - "4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    container_name: grayfile-postgres
    environment:
      POSTGRES_USER: grayfile
      POSTGRES_PASSWORD: grayfile
      POSTGRES_DB: grayfile
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grayfile -d grayfile"]
      interval: 5s
      timeout: 5s
      retries: 10

  mock-backend:
    profiles: ["inference"]
    image: wiremock/wiremock:3.13.1
    container_name: grayfile-mock-backend
    command: ["--global-response-templating"]
    ports:
      - "8000:8080"
    volumes:
      - ./mock-backend:/home/wiremock


  ext-proc:
    profiles: ["inference"]
    build:
      context: ..
      dockerfile: ext-proc/Dockerfile
    container_name: grayfile-ext-proc
    ports:
      - "18080:18080"

  envoy:
    profiles: ["inference"]
    image: envoyproxy/envoy:v1.33.2
    container_name: grayfile-envoy
    command: ["envoy", "-c", "/etc/envoy/envoy.yaml", "--log-level", "info"]
    ports:
      - "11000:11000"
      - "11001:11001"
      - "10000:10000"
      - "9901:9901"
    volumes:
      - ./envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro
    depends_on:
      litellm:
        condition: service_started
      ext-proc:
        condition: service_started
  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: grayfile-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      gateway:
        condition: service_started

  grafana:
    image: grafana/grafana:11.5.2
    container_name: grayfile-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  pgdata:
