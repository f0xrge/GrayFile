static_resources:
  listeners:
    # Ingress listener exposed to public clients (LLM APIs only).
    - name: public_llm_listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 11000
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: public_llm_ingress
                generate_request_id: true
                route_config:
                  name: public_llm_route
                  virtual_hosts:
                    - name: public_llm
                      domains: ["*"]
                      routes:
                        - match:
                            path: "/llm/v1/chat/completions"
                          request_headers_to_add:
                            - append_action: OVERWRITE_IF_EXISTS_OR_ADD
                              header:
                                key: x-request-id
                                value: "%REQ(X-REQUEST-ID)%"
                          route:
                            cluster: gateway_service
                            timeout: 15s
                        - match:
                            prefix: "/llm/v1/"
                          request_headers_to_add:
                            - append_action: OVERWRITE_IF_EXISTS_OR_ADD
                              header:
                                key: x-request-id
                                value: "%REQ(X-REQUEST-ID)%"
                          route:
                            cluster: gateway_service
                            timeout: 15s
                        - match:
                            prefix: "/"
                          direct_response:
                            status: 404
                            body:
                              inline_string: "Not found on public listener"
                local_reply_config:
                  mappers:
                    - filter:
                        status_code_filter:
                          comparison:
                            op: EQ
                            value:
                              default_value: 429
                              runtime_key: local_reply_429
                      body:
                        inline_string: '{"error":{"code":"rate_limited","message":"Request throttled by Envoy policy","type":"throttling"}}'
                      headers_to_add:
                        - append_action: OVERWRITE_IF_EXISTS_OR_ADD
                          header:
                            key: content-type
                            value: application/json
                http_filters:
                  - name: envoy.filters.http.local_ratelimit
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.local_ratelimit.v3.LocalRateLimit
                      stat_prefix: llm_public_local_rate_limiter
                      token_bucket:
                        max_tokens: 240
                        tokens_per_fill: 240
                        fill_interval: 60s
                      filter_enabled:
                        runtime_key: public_llm_local_rate_limit_enabled
                        default_value:
                          numerator: 100
                          denominator: HUNDRED
                      filter_enforced:
                        runtime_key: public_llm_local_rate_limit_enforced
                        default_value:
                          numerator: 100
                          denominator: HUNDRED
                      response_headers_to_add:
                        - append_action: OVERWRITE_IF_EXISTS_OR_ADD
                          header:
                            key: x-throttle-reason
                            value: envoy_local_rate_limit
                        - append_action: OVERWRITE_IF_EXISTS_OR_ADD
                          header:
                            key: retry-after
                            value: "60"
                        - append_action: OVERWRITE_IF_EXISTS_OR_ADD
                          header:
                            key: x-rate-limit-partition-keys
                            value: x-customer-id,x-api-key-id,x-llm-model
                      enable_x_ratelimit_headers: DRAFT_VERSION_03
                      descriptors:
                        - entries:
                            - key: generic_key
                              value: chat_completions
                            - key: customer_id
                              value: tenant-enterprise
                          token_bucket:
                            max_tokens: 600
                            tokens_per_fill: 600
                            fill_interval: 60s
                        - entries:
                            - key: generic_key
                              value: chat_completions
                            - key: customer_id
                              value: tenant-free
                          token_bucket:
                            max_tokens: 60
                            tokens_per_fill: 60
                            fill_interval: 60s
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

    # Ingress listener restricted to management APIs.
    # Intended to be reachable only from internal/VPN network segments.
    - name: restricted_management_listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 11001
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: management_ingress
                route_config:
                  name: management_route
                  virtual_hosts:
                    - name: management
                      domains: ["*"]
                      routes:
                        - match:
                            prefix: "/management/v1/"
                          route:
                            cluster: gateway_service
                            timeout: 10s
                        - match:
                            prefix: "/"
                          direct_response:
                            status: 404
                            body:
                              inline_string: "Not found on management listener"
                http_filters:
                  # AuthN: require a valid JWT issued by the OIDC provider.
                  - name: envoy.filters.http.jwt_authn
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.jwt_authn.v3.JwtAuthentication
                      providers:
                        management_oidc:
                          issuer: "https://auth.grayfile.internal/realms/grayfile"
                          audiences:
                            - "grayfile-management-api"
                          remote_jwks:
                            http_uri:
                              uri: "https://auth.grayfile.internal/realms/grayfile/protocol/openid-connect/certs"
                              cluster: oidc_jwks
                              timeout: 5s
                            cache_duration: 300s
                          forward: true
                      rules:
                        - match:
                            prefix: "/management/v1/"
                          requires:
                            provider_name: management_oidc

                  # AuthZ: explicit service identity + source network constraints.
                  - name: envoy.filters.http.rbac
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.rbac.v3.RBAC
                      rules:
                        action: ALLOW
                        policies:
                          allow_management_callers:
                            permissions:
                              - and_rules:
                                  rules:
                                    - url_path:
                                        path:
                                          prefix: "/management/v1/"
                                    - or_rules:
                                        rules:
                                          - header:
                                              name: "x-service-identity"
                                              string_match:
                                                exact: "grayfile-admin-ui"
                                          - header:
                                              name: "x-service-identity"
                                              string_match:
                                                exact: "grayfile-ops-automation"
                            principals:
                              - or_ids:
                                  ids:
                                    - remote_ip:
                                        address_prefix: "10.0.0.0"
                                        prefix_len: 8
                                    - remote_ip:
                                        address_prefix: "172.16.0.0"
                                        prefix_len: 12
                                    - remote_ip:
                                        address_prefix: "192.168.0.0"
                                        prefix_len: 16
                                    - remote_ip:
                                        address_prefix: "100.64.0.0"
                                        prefix_len: 10
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

    # Egress resilience hop used by the gateway when calling the inference backend.
    - name: llm_backend_egress_listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 10000
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: llm_gateway
                route_config:
                  name: llm_backend_route
                  virtual_hosts:
                    - name: llm_backend
                      domains: ["*"]
                      routes:
                        - match:
                            prefix: "/"
                          request_headers_to_add:
                            - append_action: OVERWRITE_IF_EXISTS_OR_ADD
                              header:
                                key: x-request-id
                                value: "%REQ(X-REQUEST-ID)%"
                          response_headers_to_add:
                            - append_action: OVERWRITE_IF_EXISTS_OR_ADD
                              header:
                                key: x-envoy-response-flags
                                value: "%RESPONSE_FLAGS%"
                            - append_action: OVERWRITE_IF_EXISTS_OR_ADD
                              header:
                                key: x-envoy-attempt-count
                                value: "%REQ(X-ENVOY-ATTEMPT-COUNT)%"
                          route:
                            cluster: llm_backend
                            timeout: 5s
                            retry_policy:
                              retry_on: connect-failure,refused-stream,retriable-status-codes,5xx,gateway-error
                              num_retries: 2
                              per_try_timeout: 2s
                              retriable_status_codes: [502, 503, 504]
                http_filters:
                  - name: envoy.filters.http.ext_proc
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExternalProcessor
                      grpc_service:
                        envoy_grpc:
                          cluster_name: ext_proc_service
                      processing_mode:
                        request_header_mode: SKIP
                        request_body_mode: SKIP
                        response_header_mode: SKIP
                        response_body_mode: BUFFERED
                        request_trailer_mode: SKIP
                        response_trailer_mode: SKIP
                      failure_mode_allow: true
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: gateway_service
      connect_timeout: 1s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      circuit_breakers:
        thresholds:
          - priority: DEFAULT
            max_connections: 200
            max_pending_requests: 250
            max_requests: 300
      load_assignment:
        cluster_name: gateway_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: gateway
                      port_value: 8080

    - name: oidc_jwks
      connect_timeout: 2s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: oidc_jwks
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: auth.grayfile.internal
                      port_value: 443
      transport_socket:
        name: envoy.transport_sockets.tls
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
          sni: auth.grayfile.internal

    - name: llm_backend
      connect_timeout: 1s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: llm_backend
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: mock-backend
                      port_value: 8080
      circuit_breakers:
        thresholds:
          - priority: DEFAULT
            max_connections: 100
            max_pending_requests: 100
            max_requests: 200
      outlier_detection:
        consecutive_5xx: 5
        interval: 10s
        base_ejection_time: 30s
        max_ejection_percent: 50

    - name: ext_proc_service
      connect_timeout: 1s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      http2_protocol_options: {}
      load_assignment:
        cluster_name: ext_proc_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: ext-proc
                      port_value: 18080

admin:
  access_log_path: /tmp/envoy-admin.log
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901
