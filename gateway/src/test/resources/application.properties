quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:grayfile;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
quarkus.datasource.username=sa
quarkus.datasource.password=sa
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/test-migration
quarkus.hibernate-orm.schema-management.strategy=none
quarkus.rest-client.llm-backend.url=http://localhost:18080
