quarkus.http.port=8080

quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${GRAYFILE_DB_URL:jdbc:postgresql://localhost:5432/grayfile}
quarkus.datasource.username=${GRAYFILE_DB_USER:grayfile}
quarkus.datasource.password=${GRAYFILE_DB_PASSWORD:grayfile}

quarkus.flyway.migrate-at-start=true
quarkus.hibernate-orm.schema-management.strategy=none

quarkus.micrometer.export.prometheus.path=/q/metrics

quarkus.rest-client.llm-backend.url=${GRAYFILE_BACKEND_URL:http://localhost:10000}
quarkus.rest-client.llm-backend.scope=jakarta.enterprise.context.ApplicationScoped

# Network resiliency (timeouts/retries/circuit-breakers) is handled by Envoy.

grayfile.audit.signing-key=${GRAYFILE_AUDIT_SIGNING_KEY:grayfile-dev-signing-key}
grayfile.audit.export.every=${GRAYFILE_AUDIT_EXPORT_EVERY:15m}
grayfile.audit.export.batch-size=${GRAYFILE_AUDIT_EXPORT_BATCH_SIZE:500}
grayfile.audit.export.filesystem-path=${GRAYFILE_AUDIT_EXPORT_PATH:build/audit-exports}
grayfile.usage.extractor.version=${GRAYFILE_USAGE_EXTRACTOR_VERSION:gateway-backend-payload-v1}
grayfile.usage.signing-key=${GRAYFILE_USAGE_SIGNING_KEY:grayfile-dev-usage-signing-key}

grayfile.routing.healthcheck.enabled=${GRAYFILE_ROUTING_HEALTHCHECK_ENABLED:true}
grayfile.routing.healthcheck.path=${GRAYFILE_ROUTING_HEALTHCHECK_PATH:/health}
grayfile.routing.healthcheck.timeout=${GRAYFILE_ROUTING_HEALTHCHECK_TIMEOUT:PT1S}
grayfile.routing.guardrails.require-active-route=${GRAYFILE_ROUTING_REQUIRE_ACTIVE_ROUTE:true}
